---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: models.agent.flokoa.ai
spec:
  group: agent.flokoa.ai
  names:
    kind: Model
    listKind: ModelList
    plural: models
    singular: model
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .status.resolvedProvider.provider
      name: Provider
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Model is the Schema for the models API.
          It defines a specific LLM model with its settings, referencing a ModelProvider for connection configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelSpec defines the desired state of Model: a named, shareable model
              configuration that compiles to AgentSpec `model` + `model_settings`.
              Rotating one Model CR recompiles every Agent that references it.
            properties:
              model:
                description: |-
                  Model is the model identifier (e.g., "gpt-5-mini",
                  "claude-sonnet-4-5"). The pydantic-ai provider prefix is derived from
                  the referenced ModelProvider unless the identifier already contains
                  one (e.g. "openai:gpt-5-mini").
                minLength: 1
                type: string
              providerRef:
                description: |-
                  ProviderRef references the ModelProvider resource that supplies
                  connection configuration (API key secret, base URL).
                properties:
                  name:
                    description: Name of the ModelProvider resource
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the ModelProvider (defaults to Model's
                      namespace)
                    type: string
                required:
                - name
                type: object
              settings:
                description: Settings contains the model settings applied to every
                  request.
                properties:
                  extra:
                    description: |-
                      Extra merges additional provider-specific settings into the compiled
                      model_settings object (e.g. extra_body, thinking, service_tier).
                      Typed fields win on key conflicts.
                    x-kubernetes-preserve-unknown-fields: true
                  extraHeaders:
                    additionalProperties:
                      type: string
                    description: ExtraHeaders to include in all requests.
                    type: object
                  frequencyPenalty:
                    description: FrequencyPenalty penalizes frequent tokens (-2.0
                      to 2.0), e.g. "0.5".
                    pattern: ^-?[0-2](\.\d+)?$
                    type: string
                  logitBias:
                    additionalProperties:
                      format: int32
                      type: integer
                    description: LogitBias modifies the likelihood of specified tokens
                      appearing.
                    type: object
                  maxTokens:
                    description: MaxTokens is the maximum number of tokens to generate.
                    format: int32
                    minimum: 1
                    type: integer
                  parallelToolCalls:
                    description: ParallelToolCalls enables parallel tool calling where
                      supported.
                    type: boolean
                  presencePenalty:
                    description: |-
                      PresencePenalty penalizes tokens already present in the context
                      (-2.0 to 2.0), e.g. "0.5".
                    pattern: ^-?[0-2](\.\d+)?$
                    type: string
                  seed:
                    description: Seed for deterministic generation (where supported).
                    format: int64
                    type: integer
                  stopSequences:
                    description: StopSequences are sequences where the model will
                      stop generating.
                    items:
                      type: string
                    type: array
                  temperature:
                    description: Temperature controls randomness in the output (0.0
                      to 2.0), e.g. "0.7".
                    pattern: ^(0(\.\d+)?|1(\.\d+)?|2(\.0+)?)$
                    type: string
                  timeoutSeconds:
                    description: TimeoutSeconds bounds each model request.
                    format: int32
                    minimum: 1
                    type: integer
                  topK:
                    description: TopK limits the number of tokens to consider for
                      each step.
                    format: int32
                    minimum: 1
                    type: integer
                  topP:
                    description: TopP controls nucleus sampling (0.0 to 1.0), e.g.
                      "0.95".
                    pattern: ^(0(\.\d+)?|1(\.0+)?)$
                    type: string
                type: object
            required:
            - model
            - providerRef
            type: object
          status:
            description: ModelStatus defines the observed state of Model
            properties:
              conditions:
                description: Standard conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: Observed generation
                format: int64
                type: integer
              ready:
                description: Ready indicates if the model is ready to be used
                type: boolean
              resolvedProvider:
                description: ResolvedProvider contains the resolved provider information
                properties:
                  name:
                    description: Name of the referenced ModelProvider
                    type: string
                  namespace:
                    description: Namespace of the referenced ModelProvider
                    type: string
                  provider:
                    description: Provider is the resolved provider type
                    enum:
                    - openai
                    - anthropic
                    - google
                    - bedrock
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
