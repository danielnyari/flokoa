---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: prompts.agent.flokoa.ai
spec:
  group: agent.flokoa.ai
  names:
    kind: Prompt
    listKind: PromptList
    plural: prompts
    singular: prompt
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.sourceVersion
      name: Source
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Prompt is the Schema for the prompts API.
          It defines a prompt with its content source (Langfuse, Langsmith, or inline).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PromptSpec defines the desired state of Prompt.
              Exactly one of Langfuse, Langsmith, or Inline must be specified in the Source.
            properties:
              source:
                description: |-
                  Source defines where the prompt content comes from.
                  Exactly one of Langfuse, Langsmith, or Inline must be specified.
                properties:
                  inline:
                    description: Inline specifies the prompt content directly.
                    properties:
                      content:
                        description: Content is the prompt content.
                        minLength: 1
                        type: string
                    required:
                    - content
                    type: object
                  langfuse:
                    description: Langfuse specifies a prompt from Langfuse.
                    properties:
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef references a secret containing Langfuse credentials.
                          The secret should contain keys: "publicKey" and "secretKey".
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      endpoint:
                        default: https://cloud.langfuse.com
                        description: Endpoint is the Langfuse API endpoint.
                        type: string
                      promptName:
                        description: PromptName is the name of the prompt in Langfuse.
                        minLength: 1
                        type: string
                      version:
                        description: |-
                          Version is the version of the prompt to fetch.
                          Use "latest" to always fetch the latest version.
                        minLength: 1
                        type: string
                    required:
                    - credentialsSecretRef
                    - promptName
                    - version
                    type: object
                  langsmith:
                    description: Langsmith specifies a prompt from Langsmith.
                    properties:
                      commitHash:
                        description: |-
                          CommitHash is the specific commit hash to fetch.
                          Use "latest" to always fetch the latest commit.
                        minLength: 1
                        type: string
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef references a secret containing Langsmith credentials.
                          The secret should contain a key: "apiKey".
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      promptName:
                        description: PromptName is the name of the prompt in Langsmith.
                        minLength: 1
                        type: string
                    required:
                    - commitHash
                    - credentialsSecretRef
                    - promptName
                    type: object
                type: object
              sync:
                description: Sync defines optional refresh behavior for non-inline
                  prompts.
                properties:
                  interval:
                    description: |-
                      Interval is the duration between sync attempts.
                      Format: "5m", "1h", "30s", etc.
                    pattern: ^([0-9]+(\.[0-9]+)?(s|m|h))+$
                    type: string
                required:
                - interval
                type: object
            required:
            - source
            type: object
          status:
            description: PromptStatus defines the observed state of Prompt.
            properties:
              checksum:
                description: Checksum is the SHA256 hash of the resolved content.
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the prompt's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              resolvedAt:
                description: ResolvedAt is the timestamp when the content was last
                  resolved.
                format: date-time
                type: string
              resolvedContent:
                description: ResolvedContent is the current resolved prompt content.
                type: string
              sourceVersion:
                description: SourceVersion is the version/commit from the external
                  source.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
