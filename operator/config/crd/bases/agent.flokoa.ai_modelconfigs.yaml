---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: modelconfigs.agent.flokoa.ai
spec:
  group: agent.flokoa.ai
  names:
    kind: ModelConfig
    listKind: ModelConfigList
    plural: modelconfigs
    singular: modelconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.modelRef.name
      name: Model
      type: string
    - jsonPath: .status.resolvedModel.provider
      name: Provider
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ModelConfig is the Schema for the modelconfigs API.
          It references a Model and defines specific parameters for a use case (e.g., an agent).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ModelConfigSpec defines the desired state of ModelConfig
            properties:
              anthropic:
                description: Anthropic-specific parameters
                properties:
                  thinking:
                    description: Thinking configuration for extended thinking models
                    properties:
                      budgetTokens:
                        description: |-
                          BudgetTokens is the maximum number of tokens for thinking (required when enabled)
                          Must be >= 1024 and less than maxTokens
                        format: int32
                        minimum: 1024
                        type: integer
                      type:
                        default: disabled
                        description: Type enables or disables extended thinking
                        enum:
                        - enabled
                        - disabled
                        type: string
                    required:
                    - type
                    type: object
                type: object
              gemini:
                description: Gemini-specific parameters
                properties:
                  candidateCount:
                    description: CandidateCount specifies how many response candidates
                      to generate
                    format: int32
                    maximum: 8
                    minimum: 1
                    type: integer
                  responseMimeType:
                    description: ResponseMimeType specifies the output MIME type
                    type: string
                  safetySettings:
                    description: SafetySettings configures content safety filters
                    items:
                      description: GeminiSafetySetting defines a safety setting for
                        Gemini
                      properties:
                        category:
                          description: Category is the harm category
                          enum:
                          - HARM_CATEGORY_HARASSMENT
                          - HARM_CATEGORY_HATE_SPEECH
                          - HARM_CATEGORY_SEXUALLY_EXPLICIT
                          - HARM_CATEGORY_DANGEROUS_CONTENT
                          type: string
                        threshold:
                          description: Threshold is the blocking threshold
                          enum:
                          - BLOCK_NONE
                          - BLOCK_LOW_AND_ABOVE
                          - BLOCK_MEDIUM_AND_ABOVE
                          - BLOCK_ONLY_HIGH
                          type: string
                      required:
                      - category
                      - threshold
                      type: object
                    type: array
                type: object
              modelRef:
                description: ModelRef references the Model resource to use
                properties:
                  name:
                    description: Name of the Model resource
                    type: string
                  namespace:
                    description: Namespace of the Model (defaults to ModelConfig's
                      namespace)
                    type: string
                required:
                - name
                type: object
              openai:
                description: OpenAI-specific parameters
                properties:
                  frequencyPenalty:
                    description: |-
                      FrequencyPenalty penalizes frequent tokens (-2.0 to 2.0)
                      Specified as a string to avoid floating point issues (e.g., "0.5", "-1.0")
                    type: string
                  logProbs:
                    description: LogProbs enables returning log probabilities
                    type: boolean
                  presencePenalty:
                    description: |-
                      PresencePenalty penalizes tokens already in the context (-2.0 to 2.0)
                      Specified as a string to avoid floating point issues (e.g., "0.5", "-1.0")
                    type: string
                  reasoningEffort:
                    description: ReasoningEffort controls the reasoning effort for
                      reasoning models (o1, o3, etc.)
                    enum:
                    - low
                    - medium
                    - high
                    type: string
                  responseFormat:
                    description: ResponseFormat specifies the output format
                    properties:
                      jsonSchema:
                        description: JSONSchema for structured outputs (when type
                          is "json_schema")
                        properties:
                          description:
                            description: Description of the schema
                            type: string
                          name:
                            description: Name of the schema
                            type: string
                          schema:
                            description: Schema is the JSON schema definition
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                          strict:
                            description: Strict enables strict schema validation
                            type: boolean
                        required:
                        - name
                        type: object
                      type:
                        description: 'Type of response format: "text" or "json_object"'
                        enum:
                        - text
                        - json_object
                        - json_schema
                        type: string
                    required:
                    - type
                    type: object
                  topLogProbs:
                    description: TopLogProbs specifies how many log probabilities
                      to return (0-20)
                    format: int32
                    maximum: 20
                    minimum: 0
                    type: integer
                type: object
              parameters:
                description: Common model parameters applicable to most providers
                properties:
                  maxTokens:
                    description: MaxTokens is the maximum number of tokens to generate
                    format: int32
                    minimum: 1
                    type: integer
                  seed:
                    description: Seed for deterministic generation (where supported)
                    format: int64
                    type: integer
                  stopSequences:
                    description: StopSequences are sequences where the model will
                      stop generating
                    items:
                      type: string
                    type: array
                  temperature:
                    description: |-
                      Temperature controls randomness in the output (0.0 to 2.0)
                      Specified as a string to avoid floating point issues (e.g., "0.7", "1.0")
                    type: string
                  topK:
                    description: TopK limits the number of tokens to consider for
                      each step
                    format: int32
                    minimum: 1
                    type: integer
                  topP:
                    description: |-
                      TopP controls nucleus sampling (0.0 to 1.0)
                      Specified as a string to avoid floating point issues (e.g., "0.9", "0.95")
                    type: string
                type: object
            required:
            - modelRef
            type: object
          status:
            description: ModelConfigStatus defines the observed state of ModelConfig
            properties:
              conditions:
                description: Standard conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: Observed generation
                format: int64
                type: integer
              ready:
                description: Ready indicates if the model config is ready to be used
                type: boolean
              resolvedModel:
                description: ResolvedModel contains the resolved model information
                properties:
                  model:
                    description: Model name from the referenced Model
                    type: string
                  name:
                    description: Name of the referenced Model
                    type: string
                  namespace:
                    description: Namespace of the referenced Model
                    type: string
                  provider:
                    description: Provider from the referenced Model
                    enum:
                    - openai
                    - anthropic
                    - azure-openai
                    - ollama
                    - gemini
                    - gemini-vertex
                    - anthropic-vertex
                    - bedrock
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
