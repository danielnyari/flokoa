apiVersion: v1
kind: Service
metadata:
  name: flokoa-server
  labels:
    app.kubernetes.io/name: flokoa
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - port: 50051
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: flokoa
    app.kubernetes.io/component: server
