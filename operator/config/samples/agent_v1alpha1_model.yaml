apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: openai-gpt4o
spec:
  provider: openai
  model: gpt-4o
  apiKeySecretRef:
    name: openai-credentials
    key: api-key
  openai:
    timeoutSeconds: 120
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: anthropic-claude-sonnet
spec:
  provider: anthropic
  model: claude-sonnet-4-20250514
  apiKeySecretRef:
    name: anthropic-credentials
    key: api-key
  anthropic:
    timeoutSeconds: 180
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: azure-gpt4
spec:
  provider: azure-openai
  model: gpt-4
  azureOpenAI:
    endpoint: https://my-resource.openai.azure.com
    deploymentName: gpt-4-deployment
    apiVersion: "2024-02-01"
  apiKeySecretRef:
    name: azure-openai-credentials
    key: api-key
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: ollama-llama
spec:
  provider: ollama
  model: llama3.2
  ollama:
    host: http://ollama.default.svc.cluster.local:11434
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: bedrock-claude
spec:
  provider: bedrock
  model: anthropic.claude-3-5-sonnet-20241022-v2:0
  bedrock:
    region: us-east-1
  # Uses IAM role when running in AWS (no explicit credentials needed)
