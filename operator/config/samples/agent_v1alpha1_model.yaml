apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: gpt4o-creative
spec:
  model: gpt-4o
  providerRef:
    name: openai-provider
  parameters:
    temperature: "0.9"
    maxTokens: 4096
    topP: "0.95"
    openai:
      frequencyPenalty: "0.5"
      presencePenalty: "0.5"
