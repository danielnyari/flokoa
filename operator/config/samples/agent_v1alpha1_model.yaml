apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: gpt4o-creative
spec:
  model: gpt-4o
  providerRef:
    name: openai-provider
  settings:
    temperature: "0.9"
    maxTokens: 4096
    topP: "0.95"
    presencePenalty: "0.5"
    frequencyPenalty: "0.5"
    # Provider-specific knobs pass through to model_settings as-is
    extra:
      service_tier: auto
