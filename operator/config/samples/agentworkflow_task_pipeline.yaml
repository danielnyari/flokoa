apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: research-pipeline
spec:
  description: "Multi-step pipeline combining Marvin tasks and agent calls"
  params:
    - name: topic
      value: "large language models"
  tasks:
    - name: research
      agentTask:
        type: run
        instruction:
          template: "Research key findings about {{params.topic}}"
        resultType:
          name: Findings
          description: "Structured research findings"
          jsonSchema:
            type: object
            properties:
              findings:
                type: array
                items:
                  type: object
                  properties:
                    title: { type: string }
                    summary: { type: string }
                  required: [title, summary]
            required: [findings]
        model:
          name: gpt-4o
        context:
          domain: "machine learning"

    - name: classify-findings
      agentTask:
        type: classify
        input: "{{tasks.research.output}}"
        labels: ["theoretical", "applied", "benchmark"]
        multiLabel: true
        instruction:
          template: "Classify each finding by research area"
      dependsOn: [research]

    - name: report
      agent:
        name: report-writer-agent
        message:
          parts:
            - text:
                text: "Generate report from: {{tasks.classify-findings.output}}"
      dependsOn: [classify-findings]
