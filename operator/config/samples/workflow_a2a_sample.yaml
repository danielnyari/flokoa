
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: a2a-simple-
spec:
  entrypoint: ask-agent
  arguments:
    parameters:
      - name: question
        value: "What are the benefits of using Kubernetes for AI workloads?"

  templates:
    - name: ask-agent
      plugin:
        a2a:
          agent: assistant-agent
          # namespace: agents  # Optional: specify namespace if agent is in different namespace
          message: "{{workflow.parameters.question}}"
          timeout: 5m
