apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: http-fetch-and-summarize
spec:
  description: "Fetch data via HTTP API then summarize with an agent"
  params:
    - name: api_endpoint
      value: "https://api.example.com/articles"
  tasks:
    - name: fetch-articles
      http:
        url: "{{params.api_endpoint}}"
        method: GET
        headers:
          - name: Accept
            value: "application/json"
          - name: Authorization
            valueFrom:
              secretKeyRef:
                name: api-credentials
                key: token
        successCondition: "response.statusCode == 200"

    - name: summarize
      agent:
        name: summarizer-agent
        text: "Summarize these articles: {{tasks.fetch-articles.output}}"
      dependsOn: [fetch-articles]
