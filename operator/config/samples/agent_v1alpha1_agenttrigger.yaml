apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTrigger
metadata:
  name: agenttrigger-sample
  namespace: default
spec:
  eventSource:
    name: webhook-events
    eventName: user-signup
  agent:
    name: signup-handler
  task:
    sessionKeyFrom: "$.body.user_id"
    metadata:
      source: "webhook"
  limits:
    maxInvocationsPerHour: 100
    maxConcurrentTasks: 5
