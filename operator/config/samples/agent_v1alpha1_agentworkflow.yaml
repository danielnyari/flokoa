apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: agentworkflow-sample
spec:
  description: "Sample workflow using a Marvin classify task"
  tasks:
    - name: classify
      agentTask:
        type: classify
        input: "The new feature works great but the documentation is lacking."
        labels: ["positive", "negative", "mixed"]
