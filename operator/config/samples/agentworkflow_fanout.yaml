apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: multi-perspective-analysis
spec:
  description: "Multiple agents work in parallel, then a final agent synthesizes their outputs"
  params:
    - name: proposal
      value: "Migrate the billing system to microservices"
  tasks:
    - name: technical-review
      agent:
        name: technical-advisor
        message: "Evaluate the technical feasibility: {{params.proposal}}"

    - name: cost-review
      agent:
        name: cost-analyst
        message: "Estimate costs and ROI: {{params.proposal}}"

    - name: risk-review
      agent:
        name: risk-assessor
        message: "Identify risks and mitigations: {{params.proposal}}"

    - name: synthesize
      agent:
        name: executive-summarizer
        message: |
          Synthesize these three reviews into a recommendation:
          Technical: {{tasks.technical-review.output}}
          Cost: {{tasks.cost-review.output}}
          Risk: {{tasks.risk-review.output}}
      dependsOn: [technical-review, cost-review, risk-review]
