apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: agenttool-sample
spec:
  type: mcp
  description: "Search and manage products via the catalog MCP server"

  # In-cluster MCP server (mutually exclusive with url)
  serviceRef:
    name: catalog-mcp
    port: 8080
  path: /mcp
  transport: streamableHTTP

  headers:
    Accept: "application/json"

  # Prefix tool names from this server to avoid collisions
  toolPrefix: catalog

  # Only expose these tools to the agent
  allowedTools:
    - searchProducts
    - getProduct

  timeoutSeconds: 30
