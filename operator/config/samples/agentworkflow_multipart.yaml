apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: document-analysis
spec:
  description: "Send a document and structured data to an agent for analysis"
  params:
    - name: project
      value: "billing-migration"
  tasks:
    - name: analyze
      agent:
        name: document-analyzer
        message:
          role: user
          contextId: "project-{{params.project}}"
          parts:
            - text:
                text: "Analyze this architecture document and report any risks"
            - file:
                file:
                  uri: "s3://docs/architecture.pdf"
                  mimeType: "application/pdf"
                  name: "architecture.pdf"
            - data:
                data:
                  constraints:
                    budget: 500000
                    timeline: "6 months"
                    team_size: 8
          metadata:
            priority: "high"
        config:
          acceptedOutputModes: ["text", "application/json"]
          blocking: true

    - name: summarize
      agent:
        name: executive-summarizer
        message:
          parts:
            - text:
                text: "Create an executive summary from: {{tasks.analyze.output}}"
      dependsOn: [analyze]
