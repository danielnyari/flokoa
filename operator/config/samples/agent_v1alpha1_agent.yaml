apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: agent-sample
spec:
  framework: pydantic-ai

  runtime:
    type: standard
    standard:
      replicas: 1

      container:
        name: agent
        image: ghcr.io/example/agent:latest

        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        env:
        - name: AGENT_MODE
          value: "development"
        - name: LOG_LEVEL
          value: "info"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
