apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: agent-sample
spec:
  card:
    name: agent-sample
    description: "Sample agent running a custom container image"
    version: "0.1.0"
    defaultInputModes:
      - application/json
    defaultOutputModes:
      - application/json
    capabilities:
      streaming: false
    skills:
      - id: assistant
        name: Assistant
        description: "Answers questions"
        tags: [sample]

  modelRef:
    name: gpt4o-creative

  runtime:
    # Custom image escape hatch: replaces the generic runner image.
    # Custom images own their bootstrap and must honor the runtime
    # contract (read /etc/flokoa/agent-spec.yaml, serve A2A over HTTP).
    image: ghcr.io/example/agent:latest

    replicas: 1

    env:
      - name: AGENT_MODE
        value: "development"
      - name: LOG_LEVEL
        value: "info"

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
