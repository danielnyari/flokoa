apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelConfig
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: gpt4o-creative
spec:
  modelRef:
    name: openai-gpt4o
  parameters:
    temperature: 0.9
    maxTokens: 4096
    topP: 0.95
  openai:
    frequencyPenalty: 0.5
    presencePenalty: 0.5
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelConfig
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: gpt4o-precise
spec:
  modelRef:
    name: openai-gpt4o
  parameters:
    temperature: 0.1
    maxTokens: 2048
    topP: 0.9
    seed: 42
  openai:
    frequencyPenalty: 0.0
    presencePenalty: 0.0
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelConfig
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: o3-reasoning-high
spec:
  modelRef:
    name: openai-gpt4o  # Would reference an o3 model in practice
  parameters:
    maxTokens: 8192
  openai:
    reasoningEffort: high
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelConfig
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: claude-sonnet-thinking
spec:
  modelRef:
    name: anthropic-claude-sonnet
  parameters:
    maxTokens: 16000
    temperature: 1.0  # Required for extended thinking
  anthropic:
    thinking:
      type: enabled
      budgetTokens: 10000
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelConfig
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: claude-sonnet-fast
spec:
  modelRef:
    name: anthropic-claude-sonnet
  parameters:
    temperature: 0.3
    maxTokens: 1024
    topP: 0.9
  anthropic:
    thinking:
      type: disabled
---
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelConfig
metadata:
  labels:
    app.kubernetes.io/name: operator
    app.kubernetes.io/managed-by: kustomize
  name: ollama-default
spec:
  modelRef:
    name: ollama-llama
  parameters:
    temperature: 0.7
    maxTokens: 2048
