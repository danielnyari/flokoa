apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: extract-entities
spec:
  description: "Extract person names from text using Marvin"
  tasks:
    - name: extract-names
      agentTask:
        type: extract
        input: "Alice and Bob went to the store. Charlie stayed home."
        resultType:
          name: PersonName
          description: "A person's name"
          jsonSchema:
            type: string
