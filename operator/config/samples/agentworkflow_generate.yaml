apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: generate-examples
spec:
  description: "Generate test cases using Marvin"
  tasks:
    - name: generate
      agentTask:
        type: generate
        instruction:
          instructionRef:
            name: example-generation-prompt
        resultType:
          name: TestCase
          description: "A test case"
          jsonSchema:
            type: object
            properties:
              input: { type: string }
              expected: { type: string }
            required: [input, expected]
        count: 10
        model:
          name: gpt-4o
