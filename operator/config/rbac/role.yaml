---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agent.flokoa.ai
  resources:
  - agents
  - agenttools
  - agentworkflows
  - instructions
  - modelproviders
  - models
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agent.flokoa.ai
  resources:
  - agents/finalizers
  - agenttools/finalizers
  - agentworkflows/finalizers
  - instructions/finalizers
  - modelproviders/finalizers
  - models/finalizers
  verbs:
  - update
- apiGroups:
  - agent.flokoa.ai
  resources:
  - agents/status
  - agenttools/status
  - agentworkflows/status
  - instructions/status
  - modelproviders/status
  - models/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
