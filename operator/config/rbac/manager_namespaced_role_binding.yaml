# Binds the namespaced slice of manager-role (the Role generated from the
# namespace-scoped markers in internal/infra/delivery: capability delivery
# probe pods + the flokoa-capability-delivery state ConfigMap) to the
# controller ServiceAccount in its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: flokoa
    app.kubernetes.io/managed-by: kustomize
  name: manager-namespaced-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: manager-role
subjects:
- kind: ServiceAccount
  name: flokoa-controller
  namespace: system
