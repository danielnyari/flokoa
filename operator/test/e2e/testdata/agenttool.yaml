# Declarative MCP endpoint pointing at the in-cluster tool service, which runs
# a minimal streamable-HTTP MCP server (petstore_mcp.py) exposing a list_pets
# tool. Exercises both the AgentTool -> MCP compilation path and a real tool
# call when an agent built from this spec is actually invoked.
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: petstore-api
spec:
  type: mcp
  description: "Petstore MCP server - browse, inspect, and manage pets"
  serviceRef:
    name: tool-service
    port: 8080
  path: /mcp
  transport: streamableHTTP
  toolPrefix: petstore
  timeoutSeconds: 30
