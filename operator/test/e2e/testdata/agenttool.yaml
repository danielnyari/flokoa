apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: petstore-api
spec:
  type: openapi
  description: "Petstore API - manage pets"
  openApi:
    serviceRef:
      name: tool-service
      port: 8080
    openApiSchema:
      endpointPath: "/api/v3/openapi.json"
    timeoutSeconds: 30
