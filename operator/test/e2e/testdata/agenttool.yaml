apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: petstore-api
spec:
  type: openapi
  description: "Petstore API - manage pets"
  openApi:
    serviceRef:
      name: tool-service
      port: 8080
    openApiSchema:
      value:
        openapi: "3.0.4"
        info:
          title: "Swagger Petstore"
          version: "1.0.7"
        servers:
          - url: "/api"
        paths:
          /pet:
            post:
              tags: ["pet"]
              summary: "Add a new pet to the store."
              operationId: "addPet"
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/Pet"
              responses:
                "200":
                  description: "Successful operation"
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Pet"
          /pet/findByStatus:
            get:
              tags: ["pet"]
              summary: "Finds Pets by status."
              operationId: "findPetsByStatus"
              parameters:
                - name: "status"
                  in: "query"
                  required: true
                  schema:
                    type: "string"
                    default: "available"
                    enum: ["available", "pending", "sold"]
              responses:
                "200":
                  description: "successful operation"
                  content:
                    application/json:
                      schema:
                        type: "array"
                        items:
                          $ref: "#/components/schemas/Pet"
          /pet/{petId}:
            get:
              tags: ["pet"]
              summary: "Find pet by ID."
              operationId: "getPetById"
              parameters:
                - name: "petId"
                  in: "path"
                  required: true
                  schema:
                    type: "integer"
                    format: "int64"
              responses:
                "200":
                  description: "successful operation"
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/Pet"
                "404":
                  description: "Pet not found"
            delete:
              tags: ["pet"]
              summary: "Deletes a pet."
              operationId: "deletePet"
              parameters:
                - name: "petId"
                  in: "path"
                  required: true
                  schema:
                    type: "integer"
                    format: "int64"
              responses:
                "200":
                  description: "Pet deleted"
        components:
          schemas:
            Category:
              type: "object"
              properties:
                id:
                  type: "integer"
                  format: "int64"
                name:
                  type: "string"
            Tag:
              type: "object"
              properties:
                id:
                  type: "integer"
                  format: "int64"
                name:
                  type: "string"
            Pet:
              required: ["name", "photoUrls"]
              type: "object"
              properties:
                id:
                  type: "integer"
                  format: "int64"
                name:
                  type: "string"
                category:
                  $ref: "#/components/schemas/Category"
                photoUrls:
                  type: "array"
                  items:
                    type: "string"
                tags:
                  type: "array"
                  items:
                    $ref: "#/components/schemas/Tag"
                status:
                  type: "string"
                  enum: ["available", "pending", "sold"]
    timeoutSeconds: 30
