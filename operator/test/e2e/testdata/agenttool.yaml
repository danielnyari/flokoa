# Declarative MCP endpoint pointing at the in-cluster tool service.
# NOTE: the petstore test service does not actually speak MCP yet; this
# fixture exists to exercise the AgentTool -> MCP capability compilation
# path (schema-valid spec, ${secret:...}-free endpoint resolution).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: petstore-api
spec:
  type: mcp
  description: "Petstore MCP server - browse, inspect, and manage pets"
  serviceRef:
    name: tool-service
    port: 8080
  path: /mcp
  transport: streamableHTTP
  toolPrefix: petstore
  timeoutSeconds: 30
