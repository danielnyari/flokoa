# RBAC for Argo Workflows to access agents in flokoa-system namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-agent-reader
rules:
  - apiGroups: ["agent.flokoa.ai"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-agent-reader-binding
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: argo
  - kind: ServiceAccount
    name: default
    namespace: argo
  - kind: ServiceAccount
    name: flokoa-controller
    namespace: flokoa-system
roleRef:
  kind: ClusterRole
  name: argo-agent-reader
  apiGroup: rbac.authorization.k8s.io
---
# Service account for workflows running in flokoa-system
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
  namespace: flokoa-system
---
# Token secret for service account (required for Kubernetes 1.24+)
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflow.service-account-token
  namespace: flokoa-system
  annotations:
    kubernetes.io/service-account.name: argo-workflow
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-agent-access
  namespace: flokoa-system
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: flokoa-system
roleRef:
  kind: ClusterRole
  name: argo-agent-reader
  apiGroup: rbac.authorization.k8s.io

---
# Argo executor permissions required by workflow plugins
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-executor
  namespace: flokoa-system
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtasksets", "workflowtaskresults", "workflows"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtasksets/status", "workflows/status"]
    verbs: ["get", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-executor-access
  namespace: flokoa-system
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: flokoa-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow-executor
