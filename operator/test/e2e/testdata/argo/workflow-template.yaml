# WorkflowTemplate for testing A2A plugin communication with agents
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: a2a-agent-test
spec:
  entrypoint: call-agent
  serviceAccountName: flokoa-workflow
  automountServiceAccountToken: true
  arguments:
    parameters:
      - name: agent-name
        value: petstore-agent
      - name: message
        value: "List a few available pets and include their IDs and names."
      - name: timeout
        value: "2m"
  templates:
    - name: call-agent
      plugin:
        a2a:
          agent: "{{workflow.parameters.agent-name}}"
          message: "{{workflow.parameters.message}}"
          timeout: "{{workflow.parameters.timeout}}"
