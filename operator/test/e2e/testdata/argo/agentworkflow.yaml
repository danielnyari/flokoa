apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentWorkflow
metadata:
  name: e2e-petstore-workflow
spec:
  description: "E2E test: call petstore agent via AgentWorkflow DSL"
  params:
    - name: prompt
      description: "The message to send to the petstore agent"
      value: "List a few available pets and include their IDs and names."
  tasks:
    - name: list-pets
      agent:
        name: petstore-agent
        text: "{{params.prompt}}"
