apiVersion: v1
kind: Pod
metadata:
  name: tool-service
  namespace: flokoa-system
  labels:
    app: tool-service
    test: e2e
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: tool-service
    image: localhost/tool-service:test
    imagePullPolicy: Never
    ports:
    - containerPort: 8080
      name: http
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
        - ALL
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tool-service
  namespace: flokoa-system
spec:
  selector:
    app: tool-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
