apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-service
  namespace: flokoa-system
  labels:
    app: tool-service
    test: e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-service
  template:
    metadata:
      labels:
        app: tool-service
        test: e2e
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: tool-service
        image: petstore:test
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: petstore-log
          mountPath: /var/log
        - name: petstore-tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
      volumes:
      - name: petstore-log
        emptyDir: {}
      - name: petstore-tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tool-service
  namespace: flokoa-system
spec:
  selector:
    app: tool-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
