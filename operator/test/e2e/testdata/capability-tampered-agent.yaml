# Agent pinned (via the flokoa-cap-echo-tampered Capability CR, created
# programmatically with the tampered artifact's digest) to a wheelhouse whose
# wheel bytes no longer match the manifest sha256s. The runner must fail
# bootstrap with the structured "wheelhouse integrity check failed" error and
# the Agent must never become Ready (roadmap 09 acceptance criterion 3).
apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: capability-tampered-agent
  labels:
    app.kubernetes.io/name: capability-tampered-agent
    test: e2e
spec:
  card:
    name: "Tampered Capability Agent"
    description: "E2E agent that must fail bootstrap on a tampered wheelhouse"
    version: "1.0.0"
    skills:
      - id: "echo"
        name: "Echo"
        description: "Never serves: bootstrap fails on wheelhouse integrity"
        tags: ["echo", "e2e", "negative"]

  modelRef:
    name: gpt-5-mini

  instructionRefs:
    - name: capability-instruction

  capabilities:
    - ref:
        name: flokoa-cap-echo-tampered
      config:
        prefix: tampered

  runtime:
    replicas: 1
