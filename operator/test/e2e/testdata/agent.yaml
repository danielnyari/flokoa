apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: petstore-agent
  labels:
    app.kubernetes.io/name: petstore-agent
    test: e2e
spec:
  card:
    name: "Petstore Agent"
    description: "Agent for querying and managing pets via Swagger Petstore APIs"
    version: "1.0.0"
    defaultInputModes:
      - "application/json"
    defaultOutputModes:
      - "application/json"
    capabilities:
      streaming: false
      pushNotifications: false
    skills:
      - id: "petstore-assistant"
        name: "Petstore Assistant"
        description: "Find, inspect, and manage pets in the petstore"
        tags: ["petstore", "api", "inventory"]

  modelRef:
    name: gpt-5-mini

  instructionRefs:
    - name: petstore-instruction

  tools:
    - name: petstore-api

  # Inline pydantic-ai AgentSpec fragment, merged with the references above.
  spec:
    outputSchema:
      type: object
      properties:
        pets:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
            required:
              - id
              - name

  runtime:
    replicas: 1
    env:
    - name: ENVIRONMENT
      value: "petstore-e2e"
    - name: LOG_LEVEL
      value: "DEBUG"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
