apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: petstore-agent
  namespace: flokoa-system
  labels:
    app.kubernetes.io/name: petstore-agent
    test: e2e
spec:
  card:
    name: "Petstore Agent"
    description: "Agent for querying and managing pets via Swagger Petstore APIs"
    version: "1.0.0"
    defaultInputModes:
      - "application/json"
    defaultOutputModes:
      - "application/json"
    capabilities:
      streaming: false
      pushNotifications: false
    skills:
      - id: "petstore-assistant"
        name: "Petstore Assistant"
        description: "Find, inspect, and manage pets in the petstore"
        tags: ["petstore", "api", "inventory"]

  framework: pydantic-ai

  model:
    name: gpt-5-mini

  instruction:
    instructionRef:
      name: petstore-instruction

  tools:
    - name: petstore-api
      toolRef:
        name: petstore-api

  runtime:
    type: template
    template:
      replicas: 1
      config:
        outputSchema:
          name: "petstore-agent-output"
          description: "List of available pets with their IDs and names"
          jsonSchema:
            type: object
            properties:
              dogs:
                type: array
                items:
                  type: string
      env:
      - name: ENVIRONMENT
        value: "petstore-e2e"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
