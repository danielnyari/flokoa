{{- if and .Values.webhooks.enabled .Values.webhooks.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "flokoa.fullname" . }}-selfsigned-issuer
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "flokoa.webhook.certificateName" . }}
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "flokoa.webhook.serviceName" . }}.{{ include "flokoa.namespace" . }}.svc
    - {{ include "flokoa.webhook.serviceName" . }}.{{ include "flokoa.namespace" . }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "flokoa.fullname" . }}-selfsigned-issuer
  secretName: {{ include "flokoa.webhook.certSecretName" . }}
{{- end }}
