{{- if .Values.webhooks.enabled }}
{{- $svcName := include "flokoa.webhook.serviceName" . }}
{{- $namespace := include "flokoa.namespace" . }}
{{- $failurePolicy := .Values.webhooks.failurePolicy }}
{{- $caBundle := .Values.webhooks.caBundle }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "flokoa.fullname" . }}-validating-webhook
  labels:
    {{- include "flokoa.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.webhooks.certManager.enabled }}
    cert-manager.io/inject-ca-from: {{ $namespace }}/{{ include "flokoa.webhook.certificateName" . }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
webhooks:
  {{- range $resource := list "agent" "agenttool" "agenttrigger" "capability" "instruction" "model" "modelprovider" "agentworkflow" }}
  - name: v{{ $resource }}-v1alpha1.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ $svcName }}
        namespace: {{ $namespace }}
        path: /validate-agent-flokoa-ai-v1alpha1-{{ $resource }}
      {{- if $caBundle }}
      caBundle: {{ $caBundle }}
      {{- end }}
    failurePolicy: {{ $failurePolicy }}
    rules:
      - apiGroups:
          - agent.flokoa.ai
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          {{- if eq $resource "capability" }}
          - capabilities
          {{- else }}
          - {{ $resource }}s
          {{- end }}
    sideEffects: None
  {{- end }}
{{- end }}
