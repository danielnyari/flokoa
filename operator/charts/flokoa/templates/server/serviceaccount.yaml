{{- if and .Values.server.enabled .Values.server.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "flokoa.server.serviceAccountName" . }}
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.server.labels" . | nindent 4 }}
  {{- with .Values.server.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
