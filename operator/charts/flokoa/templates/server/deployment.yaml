{{- if .Values.server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flokoa.server.fullname" . }}
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.server.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.server.autoscaling.enabled }}
  replicas: {{ .Values.server.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "flokoa.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "flokoa.server.selectorLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flokoa.controller.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: {{ include "flokoa.image" (dict "image" .Values.server.image "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.server.service.grpcPort }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.server.service.httpPort }}
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: {{ .Values.server.service.grpcPort | quote }}
            - name: HTTP_PORT
              value: {{ .Values.server.service.httpPort | quote }}
            - name: SWAGGER_DIR
              value: "/swagger"
            {{- if .Values.dex.enabled }}
            - name: AUTH_ENABLED
              value: "true"
            - name: AUTH_OIDC_ISSUER_URL
              value: {{ .Values.dex.issuer | quote }}
            - name: AUTH_OIDC_CLIENT_ID
              value: {{ .Values.dex.clientID | quote }}
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            grpc:
              port: {{ .Values.server.service.grpcPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: {{ .Values.server.service.grpcPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.server.securityContext | nindent 12 }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
