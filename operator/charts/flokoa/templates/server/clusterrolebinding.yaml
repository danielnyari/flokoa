{{- if and .Values.server.enabled .Values.server.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "flokoa.server.fullname" . }}-reader
  labels:
    {{- include "flokoa.server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "flokoa.server.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "flokoa.server.serviceAccountName" . }}
    namespace: {{ include "flokoa.namespace" . }}
{{- end }}
