{{- if and .Values.argo.enabled .Values.argo.a2aPlugin.enabled }}
# Role granting the A2A executor plugin access to persist task state in a
# ConfigMap. The plugin runs as a sidecar in Argo Workflow pods and uses
# the workflow's default service account (fixes #97).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "flokoa.fullname" . }}-a2a-plugin
  namespace: {{ .Values.argo.a2aPlugin.namespace }}
  labels:
    {{- include "flokoa.labels" . | nindent 4 }}
    app.kubernetes.io/component: a2a-plugin
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
    resourceNames: ["flokoa-a2a-plugin-state"]
  # Allow creating the ConfigMap when it doesn't exist yet (resourceNames
  # cannot be used with create, so we need a separate rule without names).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  # Read Agent CRs for endpoint resolution
  - apiGroups: ["agent.flokoa.ai"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "flokoa.fullname" . }}-a2a-plugin
  namespace: {{ .Values.argo.a2aPlugin.namespace }}
  labels:
    {{- include "flokoa.labels" . | nindent 4 }}
    app.kubernetes.io/component: a2a-plugin
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "flokoa.fullname" . }}-a2a-plugin
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Values.argo.a2aPlugin.namespace }}
{{- end }}
