{{- if .Values.controller.metrics.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "flokoa.controller.fullname" . }}-metrics-auth
  labels:
    {{- include "flokoa.controller.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "flokoa.controller.fullname" . }}-metrics-auth
  labels:
    {{- include "flokoa.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "flokoa.controller.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "flokoa.controller.serviceAccountName" . }}
    namespace: {{ include "flokoa.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "flokoa.controller.fullname" . }}-metrics-reader
  labels:
    {{- include "flokoa.controller.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - "/metrics"
    verbs:
      - get
{{- end }}
