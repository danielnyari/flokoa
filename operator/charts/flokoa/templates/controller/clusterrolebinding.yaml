{{- if .Values.controller.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "flokoa.controller.fullname" . }}-manager
  labels:
    {{- include "flokoa.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "flokoa.controller.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "flokoa.controller.serviceAccountName" . }}
    namespace: {{ include "flokoa.namespace" . }}
{{- end }}
