{{- include "flokoa.validateCapabilitiesVerification" . }}
{{- $cosignKeyMount := and .Values.capabilities.verification.cosign.enabled .Values.capabilities.verification.cosign.keySecretRef }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flokoa.controller.fullname" . }}
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "flokoa.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: controller
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "flokoa.controller.selectorLabels" . | nindent 8 }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "flokoa.controller.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: controller
          image: {{ include "flokoa.image" (dict "image" .Values.controller.image "appVersion" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command:
            - /manager
          args:
            - --leader-elect={{ .Values.controller.leaderElection.enabled }}
            - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
            {{- if .Values.controller.metrics.enabled }}
            - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.agentWorkflow.artifactIO.enabled }}
            - --artifact-io-enabled=true
            - --artifact-gc-strategy={{ .Values.agentWorkflow.artifactIO.artifactGC.strategy }}
            {{- end }}
            {{- if .Values.webhooks.enabled }}
            - --enable-webhooks=true
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
            {{- if .Values.runner.imageRepository }}
            - --runner-image-repository={{ .Values.runner.imageRepository }}
            {{- end }}
            {{- if .Values.telemetry.otlpEndpoint }}
            - --telemetry-otlp-endpoint={{ .Values.telemetry.otlpEndpoint }}
            {{- end }}
            - --inject-telemetry={{ .Values.platformCapabilities.telemetry.enabled }}
            - --capability-delivery-mode={{ .Values.capabilities.delivery.mode }}
            - --capability-delivery-probe-timeout={{ .Values.capabilities.delivery.probe.timeoutSeconds }}s
            {{- if .Values.capabilities.delivery.probe.image }}
            - --capability-delivery-probe-image={{ .Values.capabilities.delivery.probe.image }}
            {{- end }}
            {{- if .Values.capabilities.verification.cosign.enabled }}
            - --capability-cosign-enabled=true
            {{- if .Values.capabilities.verification.cosign.keySecretRef }}
            - --capability-cosign-key-path=/etc/flokoa/cosign/cosign.pub
            {{- else }}
            - --capability-cosign-keyless-issuer={{ .Values.capabilities.verification.cosign.keyless.issuer }}
            - --capability-cosign-keyless-identity-regexp={{ .Values.capabilities.verification.cosign.keyless.identityRegexp }}
            {{- end }}
            {{- if .Values.capabilities.verification.registrySecretRef }}
            - --capability-registry-secret-name={{ .Values.capabilities.verification.registrySecretRef }}
            {{- end }}
            {{- end }}
            {{- if .Values.capabilities.verification.requireVerified }}
            - --capability-require-verified=true
            {{- end }}
            {{- range .Values.controller.extraArgs }}
            - {{ . }}
            {{- end }}
          {{- if .Values.webhooks.enabled }}
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
          {{- end }}
          env:
            # Downward-API namespace for resources the operator keeps in its
            # own namespace (capability delivery probe pod + state ConfigMap).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.controller.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- if or .Values.webhooks.enabled $cosignKeyMount }}
          volumeMounts:
            {{- if .Values.webhooks.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            {{- if $cosignKeyMount }}
            - name: cosign-key
              mountPath: /etc/flokoa/cosign
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.webhooks.enabled $cosignKeyMount }}
      volumes:
        {{- if .Values.webhooks.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "flokoa.webhook.certSecretName" . }}
        {{- end }}
        {{- if $cosignKeyMount }}
        - name: cosign-key
          secret:
            secretName: {{ .Values.capabilities.verification.cosign.keySecretRef }}
            items:
              - key: cosign.pub
                path: cosign.pub
        {{- end }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
