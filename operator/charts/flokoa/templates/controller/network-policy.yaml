{{- if and .Values.controller.metrics.enabled .Values.controller.metrics.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "flokoa.controller.fullname" . }}-allow-metrics
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "flokoa.controller.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              metrics: enabled
      ports:
        - port: {{ .Values.controller.metrics.service.port }}
          protocol: TCP
{{- end }}
