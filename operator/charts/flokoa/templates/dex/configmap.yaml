{{- if .Values.dex.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flokoa.dex.fullname" . }}
  namespace: {{ include "flokoa.namespace" . }}
  labels:
    {{- include "flokoa.dex.labels" . | nindent 4 }}
data:
  config.yaml: |
    issuer: {{ .Values.dex.issuer }}
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    oauth2:
      skipApprovalScreen: true
      responseTypes:
        - code
      pkce:
        required: true
    staticClients:
      - id: {{ .Values.dex.clientID }}
        name: Flokoa
        redirectURIs:
          {{- range .Values.dex.redirectURIs }}
          - {{ . | quote }}
          {{- end }}
        public: true
    {{- if .Values.dex.connectors }}
    connectors:
      {{- toYaml .Values.dex.connectors | nindent 6 }}
    {{- end }}
{{- end }}
