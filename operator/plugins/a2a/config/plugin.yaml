apiVersion: argoproj.io/v1alpha1
kind: ExecutorPlugin
metadata:
  name: a2a
  namespace: argo
spec:
  sidecar:
    automountServiceAccountToken: true
    container:
      name: a2a-executor-plugin
      image: ghcr.io/danielnyari/flokoa-a2a-plugin:latest
      # IfNotPresent so a locally-built image (e.g. `make local-up` into minikube's
      # docker daemon) is used instead of always re-pulling :latest from GHCR.
      imagePullPolicy: IfNotPresent
      command:
        - /a2a-plugin
      env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      ports:
        - containerPort: 4355
          protocol: TCP
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "500m"
      securityContext:
        runAsNonRoot: false
        runAsGroup: 0
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
