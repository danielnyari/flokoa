apiVersion: argoproj.io/v1alpha1
kind: ExecutorPlugin
metadata:
  name: gcpdocai
  namespace: argo
spec:
  sidecar:
    automountServiceAccountToken: true
    container:
      name: gcpdocai-executor-plugin
      image: ghcr.io/danielnyari/flokoa-gcpdocai-plugin:latest
      command:
        - /gcpdocai-plugin
      env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # GCP credentials are provided via Workload Identity or mounted secret.
        # Uncomment and configure if using a service account key:
        # - name: GOOGLE_APPLICATION_CREDENTIALS
        #   value: /var/run/secrets/gcp/key.json
      ports:
        - containerPort: 4355
          protocol: TCP
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "500m"
      securityContext:
        runAsNonRoot: false
        runAsGroup: 0
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
