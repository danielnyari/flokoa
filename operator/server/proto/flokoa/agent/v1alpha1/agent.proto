syntax = "proto3";

package flokoa.agent.v1alpha1;

import "flokoa/agent/v1alpha1/agenttool.proto";
import "flokoa/agent/v1alpha1/common.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/danielnyari/flokoa/server/gen/go/flokoa/agent/v1alpha1;agentv1alpha1";

// AgentPhase represents the current phase of the agent lifecycle.
enum AgentPhase {
  AGENT_PHASE_UNSPECIFIED = 0;
  AGENT_PHASE_PENDING = 1;
  AGENT_PHASE_RUNNING = 2;
  AGENT_PHASE_FAILED = 3;
}

// IsolationTier selects how sessions map onto runner pods.
enum IsolationTier {
  ISOLATION_TIER_UNSPECIFIED = 0;
  ISOLATION_TIER_SHARED = 1;
  ISOLATION_TIER_SESSION = 2;
}

// InputOutputMode represents supported input/output modes.
enum InputOutputMode {
  INPUT_OUTPUT_MODE_UNSPECIFIED = 0;
  INPUT_OUTPUT_MODE_TEXT = 1;
  INPUT_OUTPUT_MODE_JSON = 2;
}

// AgentSkill describes a specific capability or function.
message AgentSkill {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  repeated string examples = 5;
  repeated string input_modes = 6;
  repeated string output_modes = 7;
  // Security schemes represented as a list of requirements (OR of ANDs)
  repeated SecurityRequirement security = 8;
}

// SecurityRequirement represents a security scheme requirement.
message SecurityRequirement {
  map<string, SecurityScopes> requirements = 1;
}

// SecurityScopes contains the scopes for a security scheme.
message SecurityScopes {
  repeated string scopes = 1;
}

// AgentExtension represents an extension with parameters.
message AgentExtension {
  string description = 1;
  google.protobuf.Struct params = 2;
  bool required = 3;
  string uri = 4;
}

// AgentCapabilities defines agent capabilities.
message AgentCapabilities {
  repeated AgentExtension extensions = 1;
  bool push_notifications = 2;
  bool state_transition_history = 3;
  bool streaming = 4;
}

// AgentCard contains agent metadata following A2A protocol.
message AgentCard {
  string name = 1;
  string description = 2;
  string version = 3;
  repeated InputOutputMode default_input_modes = 4;
  repeated InputOutputMode default_output_modes = 5;
  AgentCapabilities capabilities = 6;
  repeated AgentSkill skills = 7;
}

// CapabilityAttachment references a Capability resource with per-agent config.
message CapabilityAttachment {
  NamespacedRef ref = 1;
  google.protobuf.Struct config = 2;
}

// EnvVar represents an environment variable.
message EnvVar {
  string name = 1;
  string value = 2;
  EnvVarSource value_from = 3;
}

// EnvVarSource represents a source for an environment variable's value.
message EnvVarSource {
  SecretKeySelector secret_key_ref = 1;
  ConfigMapKeySelector config_map_key_ref = 2;
  ObjectFieldSelector field_ref = 3;
  ResourceFieldSelector resource_field_ref = 4;
}

// ObjectFieldSelector selects an APIVersioned field of an object.
message ObjectFieldSelector {
  string api_version = 1;
  string field_path = 2;
}

// ResourceFieldSelector represents container resources.
message ResourceFieldSelector {
  string container_name = 1;
  string resource = 2;
  string divisor = 3;
}

// ResourceRequirements describes compute resource requirements.
message ResourceRequirements {
  map<string, string> limits = 1;
  map<string, string> requests = 2;
}

// PodSecurityContext holds pod-level security attributes.
message PodSecurityContext {
  SELinuxOptions se_linux_options = 1;
  int64 run_as_user = 2;
  int64 run_as_group = 3;
  bool run_as_non_root = 4;
  repeated int64 supplemental_groups = 5;
  int64 fs_group = 6;
  string fs_group_change_policy = 7;
  SeccompProfile seccomp_profile = 8;
}

// SELinuxOptions are the SELinux context settings.
message SELinuxOptions {
  string user = 1;
  string role = 2;
  string type = 3;
  string level = 4;
}

// SeccompProfile defines a seccomp profile.
message SeccompProfile {
  string type = 1;
  string localhost_profile = 2;
}

// Toleration defines pod tolerations.
message Toleration {
  string key = 1;
  string operator = 2;
  string value = 3;
  string effect = 4;
  int64 toleration_seconds = 5;
}

// Affinity defines pod affinity rules.
message Affinity {
  NodeAffinity node_affinity = 1;
  PodAffinity pod_affinity = 2;
  PodAntiAffinity pod_anti_affinity = 3;
}

// NodeAffinity defines node affinity scheduling rules.
message NodeAffinity {
  NodeSelector required_during_scheduling_ignored_during_execution = 1;
  repeated PreferredSchedulingTerm preferred_during_scheduling_ignored_during_execution = 2;
}

// PodAffinity defines pod affinity scheduling rules.
message PodAffinity {
  repeated PodAffinityTerm required_during_scheduling_ignored_during_execution = 1;
  repeated WeightedPodAffinityTerm preferred_during_scheduling_ignored_during_execution = 2;
}

// PodAntiAffinity defines pod anti-affinity scheduling rules.
message PodAntiAffinity {
  repeated PodAffinityTerm required_during_scheduling_ignored_during_execution = 1;
  repeated WeightedPodAffinityTerm preferred_during_scheduling_ignored_during_execution = 2;
}

// NodeSelector defines node selection constraints.
message NodeSelector {
  repeated NodeSelectorTerm node_selector_terms = 1;
}

// NodeSelectorTerm defines node selector requirements.
message NodeSelectorTerm {
  repeated NodeSelectorRequirement match_expressions = 1;
  repeated NodeSelectorRequirement match_fields = 2;
}

// NodeSelectorRequirement is a selector requirement.
message NodeSelectorRequirement {
  string key = 1;
  string operator = 2;
  repeated string values = 3;
}

// PreferredSchedulingTerm is a preferred scheduling term.
message PreferredSchedulingTerm {
  int32 weight = 1;
  NodeSelectorTerm preference = 2;
}

// PodAffinityTerm defines a pod affinity term.
message PodAffinityTerm {
  LabelSelector label_selector = 1;
  repeated string namespaces = 2;
  string topology_key = 3;
  LabelSelector namespace_selector = 4;
}

// WeightedPodAffinityTerm is a weighted pod affinity term.
message WeightedPodAffinityTerm {
  int32 weight = 1;
  PodAffinityTerm pod_affinity_term = 2;
}

// LabelSelector is a label query over a set of resources.
message LabelSelector {
  map<string, string> match_labels = 1;
  repeated LabelSelectorRequirement match_expressions = 2;
}

// LabelSelectorRequirement is a selector requirement.
message LabelSelectorRequirement {
  string key = 1;
  string operator = 2;
  repeated string values = 3;
}

// AgentRuntime configures how the compiled spec runs.
message AgentRuntime {
  string image = 1;
  string runner_version = 2;
  IsolationTier isolation = 3;
  repeated EnvVar env = 4;
  ResourceRequirements resources = 5;
  int32 replicas = 6;
  repeated LocalObjectReference image_pull_secrets = 7;
  string service_account_name = 8;
  PodSecurityContext security_context = 9;
  map<string, string> node_selector = 10;
  repeated Toleration tolerations = 11;
  Affinity affinity = 12;
}

// AgentSpec defines the desired state of an Agent: the composition root of a
// pydantic-ai AgentSpec (inline fragment + Model/Instruction/AgentTool/
// Capability references), compiled by the operator into one resolved spec.
message AgentSpec {
  AgentCard card = 1;
  AgentRuntime runtime = 2;
  // Inline pydantic-ai AgentSpec fragment (JSON form).
  google.protobuf.Struct spec = 3;
  NamespacedRef model_ref = 4;
  repeated NamespacedRef instruction_refs = 5;
  repeated NamespacedRef tools = 6;
  repeated CapabilityAttachment capabilities = 7;
  map<string, SecretKeySelector> secret_refs = 8;
}

// AgentStatus defines the observed state of Agent.
message AgentStatus {
  AgentPhase phase = 1;
  string url = 2;
  string spec_hash = 3;
  string runner_version = 4;
  repeated string injected_capabilities = 5;
  int32 replicas = 6;
  int32 available_replicas = 7;
  repeated Condition conditions = 8;
  int64 observed_generation = 9;
}

// Agent is the top-level Agent resource.
message Agent {
  ObjectMeta metadata = 1;
  AgentSpec spec = 2;
  AgentStatus status = 3;
}

// AgentList contains a list of Agent resources.
message AgentList {
  ListMeta metadata = 1;
  repeated Agent items = 2;
}
