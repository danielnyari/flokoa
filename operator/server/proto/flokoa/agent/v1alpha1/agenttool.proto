syntax = "proto3";

package flokoa.agent.v1alpha1;

import "flokoa/agent/v1alpha1/common.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/danielnyari/flokoa/server/gen/go/flokoa/agent/v1alpha1;agentv1alpha1";

// AgentToolType represents the type of tool.
enum AgentToolType {
  AGENT_TOOL_TYPE_UNSPECIFIED = 0;
  AGENT_TOOL_TYPE_OPENAPI = 1;
}

// ServiceRef references a Kubernetes service.
message ServiceRef {
  string name = 1;
  string namespace = 2;
  int32 port = 3;
  string port_name = 4;
}

// ConfigMapKeyRef references a key in a ConfigMap.
message ConfigMapKeyRef {
  string name = 1;
  string key = 2;
}

// OpenApiSchema defines where the OpenAPI specification is sourced from.
// Exactly one of value, value_from, or endpoint_path must be specified.
message OpenApiSchema {
  // Inline OpenAPI specification.
  google.protobuf.Struct value = 1;
  // Reference to a ConfigMap containing the OpenAPI specification.
  ConfigMapKeyRef value_from = 2;
  // Path on the target service/URL where the OpenAPI spec is served.
  string endpoint_path = 3;
}

// OpenApiToolSpec defines configuration for OpenAPI-based tools.
message OpenApiToolSpec {
  string url = 1;
  ServiceRef service_ref = 2;
  OpenApiSchema open_api_schema = 3;
  int32 timeout_seconds = 4;
  map<string, string> headers = 5;
}

// AgentToolSpec defines the desired state of AgentTool.
message AgentToolSpec {
  AgentToolType type = 1;
  string description = 2;
  OpenApiToolSpec open_api = 3;
}

// AgentToolStatus defines the observed state of AgentTool.
message AgentToolStatus {
  repeated Condition conditions = 1;
  int64 observed_generation = 2;
}

// AgentTool is the top-level AgentTool resource.
message AgentTool {
  ObjectMeta metadata = 1;
  AgentToolSpec spec = 2;
  AgentToolStatus status = 3;
}

// AgentToolList contains a list of AgentTool resources.
message AgentToolList {
  ListMeta metadata = 1;
  repeated AgentTool items = 2;
}
