syntax = "proto3";

package flokoa.agent.v1alpha1;

import "flokoa/agent/v1alpha1/common.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/danielnyari/flokoa/server/gen/go/flokoa/agent/v1alpha1;agentv1alpha1";

// AgentToolType represents the type of tool.
enum AgentToolType {
  AGENT_TOOL_TYPE_UNSPECIFIED = 0;
  AGENT_TOOL_TYPE_HTTP_API = 1;
}

// HTTPMethod represents HTTP methods.
enum HTTPMethod {
  HTTP_METHOD_UNSPECIFIED = 0;
  HTTP_METHOD_GET = 1;
  HTTP_METHOD_POST = 2;
  HTTP_METHOD_PUT = 3;
  HTTP_METHOD_PATCH = 4;
  HTTP_METHOD_DELETE = 5;
}

// ServiceRef references a Kubernetes service.
message ServiceRef {
  string name = 1;
  string namespace = 2;
  int32 port = 3;
  string port_name = 4;
}

// HTTPApiSpec defines configuration for HTTP API tools.
message HTTPApiSpec {
  string url = 1;
  ServiceRef service_ref = 2;
  string path = 3;
  HTTPMethod method = 4;
  int32 timeout_seconds = 5;
  map<string, string> headers = 6;
}

// ConfigMapKeyRef references a key in a ConfigMap.
message ConfigMapKeyRef {
  string name = 1;
  string key = 2;
}

// OpenApiSchemaRef references an OpenAPI specification.
message OpenApiSchemaRef {
  string url = 1;
  ConfigMapKeyRef config_map_ref = 2;
}

// AgentToolSpec defines the desired state of AgentTool.
message AgentToolSpec {
  AgentToolType type = 1;
  string description = 2;
  HTTPApiSpec http_api = 3;
  google.protobuf.Struct input_schema = 4;
  google.protobuf.Struct output_schema = 5;
  OpenApiSchemaRef open_api_schema_ref = 6;
}

// AgentToolStatus defines the observed state of AgentTool.
message AgentToolStatus {
  repeated Condition conditions = 1;
  int64 observed_generation = 2;
}

// AgentTool is the top-level AgentTool resource.
message AgentTool {
  ObjectMeta metadata = 1;
  AgentToolSpec spec = 2;
  AgentToolStatus status = 3;
}

// AgentToolList contains a list of AgentTool resources.
message AgentToolList {
  ListMeta metadata = 1;
  repeated AgentTool items = 2;
}
