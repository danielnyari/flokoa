syntax = "proto3";

package flokoa.agent.v1alpha1;

import "flokoa/agent/v1alpha1/common.proto";

option go_package = "github.com/danielnyari/flokoa/server/gen/go/flokoa/agent/v1alpha1;agentv1alpha1";

// AgentToolType represents the type of tool.
enum AgentToolType {
  AGENT_TOOL_TYPE_UNSPECIFIED = 0;
  // Retired with the v2.1 pivot; admission rejects it.
  AGENT_TOOL_TYPE_OPENAPI = 1;
  AGENT_TOOL_TYPE_MCP = 2;
}

// MCPTransport selects the MCP transport protocol.
enum MCPTransport {
  MCP_TRANSPORT_UNSPECIFIED = 0;
  MCP_TRANSPORT_STREAMABLE_HTTP = 1;
  MCP_TRANSPORT_SSE = 2;
}

// ServiceRef references a Kubernetes service.
message ServiceRef {
  string name = 1;
  string namespace = 2;
  int32 port = 3;
  string port_name = 4;
}

// ConfigMapKeySelector references a key in a ConfigMap.
message ConfigMapKeySelector {
  string name = 1;
  string key = 2;
  bool optional = 3;
}

// SecretHeader sources an HTTP header value from a Secret key.
message SecretHeader {
  string name = 1;
  SecretKeySelector secret_ref = 2;
}

// AgentToolSpec defines the desired state of AgentTool: a declarative MCP
// endpoint compiling to an MCP capability entry in the resolved AgentSpec.
message AgentToolSpec {
  AgentToolType type = 1;
  string description = 2;
  string url = 3;
  ServiceRef service_ref = 4;
  string path = 5;
  MCPTransport transport = 6;
  map<string, string> headers = 7;
  repeated SecretHeader header_secrets = 8;
  string tool_prefix = 9;
  repeated string allowed_tools = 10;
  int32 timeout_seconds = 11;
}

// AgentToolStatus defines the observed state of AgentTool.
message AgentToolStatus {
  repeated Condition conditions = 1;
  int64 observed_generation = 2;
}

// AgentTool is the top-level AgentTool resource.
message AgentTool {
  ObjectMeta metadata = 1;
  AgentToolSpec spec = 2;
  AgentToolStatus status = 3;
}

// AgentToolList contains a list of AgentTool resources.
message AgentToolList {
  ListMeta metadata = 1;
  repeated AgentTool items = 2;
}
