syntax = "proto3";

package flokoa.agent.v1alpha1;

import "flokoa/agent/v1alpha1/agentworkflow.proto";
import "flokoa/agent/v1alpha1/common.proto";
import "google/api/annotations.proto";

option go_package = "github.com/danielnyari/flokoa/server/gen/go/flokoa/agent/v1alpha1;agentv1alpha1";

// AgentWorkflowService provides operations for AgentWorkflow resources and their runs.
service AgentWorkflowService {
  // GetAgentWorkflow retrieves an AgentWorkflow by name and namespace.
  rpc GetAgentWorkflow(GetAgentWorkflowRequest) returns (AgentWorkflow) {
    option (google.api.http) = {
      get: "/api/v1alpha1/namespaces/{namespace}/agentworkflows/{name}"
    };
  }

  // ListAgentWorkflows lists AgentWorkflows in a namespace or across all namespaces.
  rpc ListAgentWorkflows(ListAgentWorkflowsRequest) returns (AgentWorkflowList) {
    option (google.api.http) = {
      get: "/api/v1alpha1/agentworkflows"
      additional_bindings {
        get: "/api/v1alpha1/namespaces/{namespace}/agentworkflows"
      }
    };
  }

  // ListWorkflowRuns lists workflow runs for a specific AgentWorkflow.
  rpc ListWorkflowRuns(ListWorkflowRunsRequest) returns (WorkflowRunList) {
    option (google.api.http) = {
      get: "/api/v1alpha1/namespaces/{namespace}/agentworkflows/{workflow_name}/runs"
    };
  }

  // GetWorkflowRun retrieves a specific workflow run with full node details.
  rpc GetWorkflowRun(GetWorkflowRunRequest) returns (WorkflowRun) {
    option (google.api.http) = {
      get: "/api/v1alpha1/namespaces/{namespace}/agentworkflows/{workflow_name}/runs/{run_name}"
    };
  }

  // SubmitWorkflowRun creates a new workflow run from the AgentWorkflow's template.
  rpc SubmitWorkflowRun(SubmitWorkflowRunRequest) returns (WorkflowRun) {
    option (google.api.http) = {
      post: "/api/v1alpha1/namespaces/{namespace}/agentworkflows/{workflow_name}/runs"
      body: "*"
    };
  }
}

// GetAgentWorkflowRequest is the request for GetAgentWorkflow.
message GetAgentWorkflowRequest {
  string namespace = 1;
  string name = 2;
}

// ListAgentWorkflowsRequest is the request for ListAgentWorkflows.
message ListAgentWorkflowsRequest {
  // Empty namespace means all namespaces
  string namespace = 1;
  ListOptions options = 2;
}

// ListWorkflowRunsRequest is the request for ListWorkflowRuns.
message ListWorkflowRunsRequest {
  string namespace = 1;
  string workflow_name = 2;
  ListOptions options = 3;
}

// GetWorkflowRunRequest is the request for GetWorkflowRun.
message GetWorkflowRunRequest {
  string namespace = 1;
  string workflow_name = 2;
  string run_name = 3;
}

// SubmitWorkflowRunRequest is the request for SubmitWorkflowRun.
message SubmitWorkflowRunRequest {
  string namespace = 1;
  string workflow_name = 2;
  map<string, string> parameters = 3;
}
