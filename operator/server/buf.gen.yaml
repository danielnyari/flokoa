# Local protoc plugins (go install'ed; see Makefile buf-plugins) so generation
# works without Buf Schema Registry access. Versions track go.mod.
version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/danielnyari/flokoa/server/gen/go
      module: buf.build/flokoa/agent
  disable:
    - module: buf.build/flokoa/agent
      path: google/api
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-openapiv2
    out: gen/openapiv2
    opt:
      - allow_merge=true
      - merge_file_name=api
