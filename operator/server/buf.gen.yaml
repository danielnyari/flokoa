version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/danielnyari/flokoa/server/gen/go
      module: buf.build/flokoa/agent
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: gen/openapiv2
    opt:
      - allow_merge=true
      - merge_file_name=api
