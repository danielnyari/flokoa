# OpenAI o1 Reasoning Model
apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  name: o1
  labels:
    provider: openai
    model: o1
    type: reasoning
spec:
  model: "o1"

  providerRef:
    name: openai-provider

  settings:
    maxTokens: 16000

    # Provider-specific knobs pass through `extra` into the compiled
    # model_settings (pydantic-ai settings keys).
    extra:
      openai_reasoning_effort: high
      openai_send_reasoning_ids: true
      openai_reasoning_summary: detailed
