# Tool that calls an internal Kubernetes service
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: inventory-check
  labels:
    category: inventory
    scope: internal
spec:
  type: openapi
  description: "Check product inventory levels in the warehouse system"

  openApi:
    serviceRef:
      name: inventory-service
      namespace: backend
      port: 8080
    timeoutSeconds: 10
    openApiSchema:
      endpointPath: "/api/openapi.json"
