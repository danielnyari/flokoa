# Tool that calls an internal Kubernetes service
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: inventory-check
  labels:
    type: http-api
    category: inventory
    scope: internal
spec:
  type: http-api
  description: "Check product inventory levels in the warehouse system"
  
  httpApi:
    # Reference internal Kubernetes service
    serviceRef:
      name: inventory-service
      namespace: backend
      port: 8080
    
    path: "/api/v1/inventory"
    method: GET
    timeoutSeconds: 10
  
  inputSchema:
    type: object
    properties:
      productId:
        type: string
        description: "Product SKU or ID"
      warehouseId:
        type: string
        description: "Warehouse identifier (optional)"
    required:
      - productId
  
  outputSchema:
    type: object
    properties:
      productId:
        type: string
      availableQuantity:
        type: integer
        description: "Units available"
      reservedQuantity:
        type: integer
        description: "Units reserved for orders"
      warehouseLocation:
        type: string
      lastUpdated:
        type: string
        format: date-time
