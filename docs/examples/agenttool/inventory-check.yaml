# Tool that calls an internal Kubernetes service
# The MCP server fronts the underlying API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: inventory-check
  labels:
    category: inventory
    scope: internal
spec:
  type: mcp
  description: Check product inventory levels in the warehouse system
  serviceRef:
    name: inventory-service
    namespace: backend
    port: 8080
  path: /mcp
  timeoutSeconds: 10
