# Simple external API tool
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: weather-api
  labels:
    category: weather
spec:
  type: openapi
  description: "Get current weather information for a location"

  openApi:
    url: "https://api.weather.com/v1"
    timeoutSeconds: 30
    headers:
      Accept: "application/json"
    openApiSchema:
      endpointPath: "/openapi.json"
