# Simple external API tool
# The MCP server fronts the underlying API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: weather-api
  labels:
    category: weather
spec:
  type: mcp
  description: Get current weather information for a location
  url: https://api.weather.com/v1/mcp
  headers:
    Accept: application/json
  timeoutSeconds: 30
