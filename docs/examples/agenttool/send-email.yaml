# Email sending tool with a secret-backed Authorization header.
# The MCP server fronts the underlying email API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: send-email
  labels:
    category: notifications
spec:
  type: mcp
  description: Send email notifications to users
  url: https://mcp.sendgrid.example.com/mcp
  headerSecrets:
    - name: Authorization
      secretRef:
        name: sendgrid-credentials
        key: api-key
  allowedTools: [send_email]
  timeoutSeconds: 30
