# Tool for creating support tickets
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: create-ticket
  labels:
    category: support
spec:
  type: openapi
  description: "Create a support ticket in the helpdesk system"

  openApi:
    url: "https://api.helpdesk.com/v1"
    timeoutSeconds: 30
    headers:
      Content-Type: "application/json"
    openApiSchema:
      endpointPath: "/openapi.json"
