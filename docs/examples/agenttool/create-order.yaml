# Order creation tool using internal service
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: create-order
  labels:
    category: orders
spec:
  type: openapi
  description: "Create a new customer order with multiple items"

  openApi:
    serviceRef:
      name: order-service
      namespace: backend
      port: 8080
    timeoutSeconds: 30
    openApiSchema:
      endpointPath: "/api/v1/openapi.json"
