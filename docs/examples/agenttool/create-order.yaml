# Complex tool with nested schemas
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: create-order
  labels:
    type: http-api
    category: orders
spec:
  type: http-api
  description: "Create a new customer order with multiple items"
  
  httpApi:
    serviceRef:
      name: order-service
      namespace: backend
      port: 8080
    path: "/api/v1/orders"
    method: POST
    timeoutSeconds: 30
  
  inputSchema:
    type: object
    properties:
      customerId:
        type: string
        description: "Customer ID"
      items:
        type: array
        minItems: 1
        maxItems: 50
        description: "Order items"
        items:
          type: object
          properties:
            productId:
              type: string
              description: "Product SKU"
            quantity:
              type: integer
              minimum: 1
              maximum: 100
              description: "Quantity to order"
            price:
              type: number
              description: "Unit price"
            customization:
              type: object
              description: "Product customization options"
              properties:
                color:
                  type: string
                size:
                  type: string
                  enum: ["XS", "S", "M", "L", "XL", "XXL"]
          required:
            - productId
            - quantity
      shippingAddress:
        type: object
        description: "Shipping address"
        properties:
          street:
            type: string
          city:
            type: string
          state:
            type: string
          zipCode:
            type: string
          country:
            type: string
        required:
          - street
          - city
          - zipCode
          - country
      notes:
        type: string
        maxLength: 500
        description: "Order notes"
    required:
      - customerId
      - items
      - shippingAddress
  
  outputSchema:
    type: object
    properties:
      orderId:
        type: string
        description: "Created order ID"
      status:
        type: string
        enum: ["pending", "confirmed", "processing"]
      totalAmount:
        type: number
        description: "Total order amount"
      estimatedDelivery:
        type: string
        format: date
        description: "Estimated delivery date"
      trackingNumber:
        type: string
        description: "Shipping tracking number"
