# Order creation tool using internal service
# The MCP server fronts the underlying API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: create-order
  labels:
    category: orders
spec:
  type: mcp
  description: Create a new customer order with multiple items
  serviceRef:
    name: order-service
    namespace: backend
    port: 8080
  path: /mcp
  timeoutSeconds: 30
