# Knowledge base search tool
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: search-knowledge-base
  labels:
    category: search
spec:
  type: openapi
  description: "Search the internal knowledge base for documentation and FAQs"

  openApi:
    serviceRef:
      name: search-service
      namespace: knowledge
      port: 8080
    timeoutSeconds: 15
    openApiSchema:
      endpointPath: "/api/openapi.json"
