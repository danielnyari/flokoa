# Knowledge base search tool
# The MCP server fronts the underlying API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: search-knowledge-base
  labels:
    category: search
spec:
  type: mcp
  description: Search the internal knowledge base for documentation and FAQs
  serviceRef:
    name: search-service
    namespace: knowledge
    port: 8080
  path: /mcp
  timeoutSeconds: 15
