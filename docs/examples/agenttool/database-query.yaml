# Database query tool (via internal query service)
# The MCP server fronts the underlying API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: database-query
  labels:
    category: database
spec:
  type: mcp
  description: Execute read-only SQL queries against the database via the query service
  serviceRef:
    name: query-service
    namespace: data-layer
    port: 5000
  path: /mcp
  timeoutSeconds: 60
