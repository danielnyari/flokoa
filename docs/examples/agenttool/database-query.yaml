# Database query tool (via internal query service)
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: database-query
  labels:
    category: database
spec:
  type: openapi
  description: "Execute read-only SQL queries against the database via the query service"

  openApi:
    serviceRef:
      name: query-service
      namespace: data-layer
      port: 5000
    timeoutSeconds: 60
    openApiSchema:
      endpointPath: "/openapi.json"
