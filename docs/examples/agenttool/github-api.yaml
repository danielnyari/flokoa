# Tool using an external OpenAPI specification
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: github-api
  labels:
    category: integration
    provider: github
spec:
  type: openapi
  description: "Search GitHub repositories and get repository information"

  openApi:
    url: "https://api.github.com"
    timeoutSeconds: 30
    headers:
      Accept: "application/vnd.github.v3+json"
    openApiSchema:
      endpointPath: "/openapi.json"
