# Tool using an external MCP server
# The MCP server fronts the underlying API (the OpenAPI tool type is
# retired; front REST APIs with an MCP adapter or a Capability).
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: github-api
  labels:
    category: integration
    provider: github
spec:
  type: mcp
  description: Search GitHub repositories and get repository information
  url: https://api.github.com/mcp
  headers:
    Accept: application/vnd.github.v3+json
  timeoutSeconds: 30
