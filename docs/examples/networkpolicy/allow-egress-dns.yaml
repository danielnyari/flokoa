# Allow DNS Resolution for Flokoa Agent Pods
#
# Agent pods need DNS resolution to reach external services.
# This policy allows egress to kube-dns/CoreDNS on port 53.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flokoa-agent-allow-dns
  namespace: default
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: flokoa-operator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
