# Default Deny NetworkPolicy for Flokoa Agent Pods
#
# This policy denies all ingress and egress traffic to agent pods by default.
# Apply this first, then layer on specific allow policies as needed.
#
# Selects all pods managed by the flokoa-operator.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flokoa-agent-default-deny
  namespace: default
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: flokoa-operator
  policyTypes:
    - Ingress
    - Egress
