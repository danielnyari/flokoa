# Allow Ingress from Flokoa Operator for Health Checks
#
# The operator performs health checks against agent pods. This policy allows
# ingress from the controller pods to agent health check and serving ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flokoa-agent-allow-ingress-operator
  namespace: default
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: flokoa-operator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
              app.kubernetes.io/managed-by: Helm
              app.kubernetes.io/part-of: flokoa
