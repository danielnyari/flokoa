# Complete example: Customer Service Agent
# This example shows all CRDs composing into one compiled agent.

---
# Step 1: Create ModelProvider (connection config + API key secret)
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelProvider
metadata:
  name: openai-provider
  namespace: customer-service
spec:
  apiKeySecretRef:
    name: openai-credentials
    key: api-key
  openai:
    timeoutSeconds: 60

---
# Step 2: Create Model (named, shareable model configuration)
apiVersion: agent.flokoa.ai/v1alpha1
kind: Model
metadata:
  name: gpt-4o-support
  namespace: customer-service
spec:
  model: "gpt-4o"
  providerRef:
    name: openai-provider
  settings:
    temperature: "0.7"
    maxTokens: 4096
    topP: "0.9"

---
# Step 3: Create Instructions (versioned, shareable prompt blocks)
apiVersion: agent.flokoa.ai/v1alpha1
kind: Instruction
metadata:
  name: support-policy
  namespace: customer-service
spec:
  content: |
    You are a friendly customer service agent. Be empathetic and concise.
    Never promise refunds without checking the policy first.

---
# Step 4: Create AgentTools (declarative MCP endpoints)
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: search-knowledge-base
  namespace: customer-service
spec:
  type: mcp
  description: "Search the knowledge base for answers to customer questions"
  serviceRef:
    name: kb-service
    namespace: backend
    port: 8080
  path: /mcp
  timeoutSeconds: 10

---
apiVersion: agent.flokoa.ai/v1alpha1
kind: AgentTool
metadata:
  name: create-support-ticket
  namespace: customer-service
spec:
  type: mcp
  description: "Create a support ticket when the agent cannot resolve the issue"
  serviceRef:
    name: ticket-service
    namespace: backend
    port: 8080
  path: /mcp
  toolPrefix: helpdesk
  headerSecrets:
    - name: Authorization
      secretRef:
        name: helpdesk-credentials
        key: token
  timeoutSeconds: 15

---
# Step 5: Create the Agent — the composition root. The operator compiles the
# refs + inline fragment into one pydantic-ai AgentSpec, validates it against
# the runner's pinned schema, and runs it on the generic runner.
apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: customer-service-agent
  namespace: customer-service
  labels:
    app.kubernetes.io/name: customer-service-agent
    app.kubernetes.io/component: ai-agent
spec:
  card:
    name: customer-service-agent
    description: "Handles customer support questions, tickets, and order status"
    version: "1.0.0"
    defaultInputModes:
      - application/json
    defaultOutputModes:
      - application/json
    capabilities:
      streaming: false
    skills:
      - id: answer-questions
        name: Answer Questions
        description: "Answers product and policy questions from the knowledge base"
        tags: [support, kb]
      - id: manage-tickets
        name: Manage Tickets
        description: "Creates support tickets for unresolved issues"
        tags: [support, tickets]

  modelRef:
    name: gpt-4o-support
  instructionRefs:
    - name: support-policy
  tools:
    - name: search-knowledge-base
    - name: create-support-ticket

  spec:
    instructions:
      - "Today's priority: order-status questions."
    outputSchema:
      type: object
      properties:
        answer: {type: string}
        ticketId: {type: string}
      required: [answer]

  runtime:
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
