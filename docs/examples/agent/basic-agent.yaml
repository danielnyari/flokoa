apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: basic-agent
  labels:
    app.kubernetes.io/name: basic-agent
    app.kubernetes.io/component: ai-agent
    app.kubernetes.io/managed-by: flokoa-operator
spec:
  # Framework declaration for observability and tooling
  framework: pydantic-ai

  runtime:
    type: standard
    spec:
      # Number of agent replicas
      replicas: 2

      # Container configuration
      container:
        name: agent
        image: ghcr.io/example/pydantic-ai-agent:v1.0.0

        # Container ports
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        # Environment variables
        env:
        - name: AGENT_MODE
          value: "production"
        - name: LOG_LEVEL
          value: "info"

        # Resource limits
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
