# The custom-image escape hatch plus scheduling overrides. Custom images own
# their bootstrap and must honor the runtime contract: read the compiled spec
# at /etc/flokoa/agent-spec.yaml, resolve FLOKOA_SECRET_* env, serve A2A on
# FLOKOA_PORT (see docs/reference/runtime-contract.md).
apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: advanced-agent
  labels:
    app.kubernetes.io/name: advanced-agent
    environment: production
spec:
  card:
    name: advanced-agent
    description: "Production agent on a custom image"
    version: "2.1.0"
    capabilities:
      streaming: true
    skills:
      - id: analyze
        name: Analyze
        description: "Analyzes documents"
        tags: [analysis]

  modelRef:
    name: gpt-4o

  spec:
    outputSchema:
      type: object
      properties:
        summary: {type: string}
        confidence: {type: number}
      required: [summary]

  runtime:
    image: ghcr.io/example/custom-agent:v2.1.0
    replicas: 3
    serviceAccountName: agent-sa
    env:
      - name: AGENT_MODE
        value: "production"
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    nodeSelector:
      workload-type: ai-agents
    tolerations:
      - key: ai-workload
        operator: Equal
        value: "true"
        effect: NoSchedule
