# The minimal agent: a card, a model, an instruction — no image, no build.
# The operator compiles this into a pydantic-ai AgentSpec and runs it on the
# generic runner.
apiVersion: agent.flokoa.ai/v1alpha1
kind: Agent
metadata:
  name: minimal-agent
spec:
  card:
    name: minimal-agent
    description: "Answers questions"
    version: "0.1.0"
    skills:
      - id: assistant
        name: Assistant
        description: "General-purpose assistant"
        tags: [assistant]
  spec:
    model: openai:gpt-5-mini
    instructions:
      - "You are a helpful assistant. Be concise."
