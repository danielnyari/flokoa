# AWS Bedrock Provider
# Note: Requires AWS credentials configured via IRSA, instance profile, or environment variables
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelProvider
metadata:
  name: bedrock-provider
  labels:
    provider: bedrock
spec:
  bedrock:
    # AWS region
    region: "us-east-1"
    
    # Optional: inference profile ARN
    # inferenceProfileARN: "arn:aws:bedrock:us-east-1:123456789012:inference-profile/xxx"
