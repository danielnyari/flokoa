# OpenAI Provider
apiVersion: agent.flokoa.ai/v1alpha1
kind: ModelProvider
metadata:
  name: openai-provider
  labels:
    provider: openai
spec:
  apiKeySecretRef:
    name: openai-credentials
    key: api-key

  # The provider type is inferred from this block being present.
  # To override the default endpoint, set baseURL here.
  openai: {}
  # Per-request timeouts are configured on the Model (settings.timeoutSeconds), not here.
