[project]
name = "flokoa-types"
version = "0.1.0"
description = "Auto-generated Pydantic models from Flokoa Kubernetes CRD schemas"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flokoa_types"]

[tool.uv]
package = true
