repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: ^(docs/.*|operator/charts/.*|operator/test/e2e/testdata/.*\.yaml)$
      - id: check-json
        exclude: ^(.devcontainer/devcontainer.json|schemas/.*\.schema\.json)
      - id: pretty-format-json
        exclude: ^(.devcontainer/devcontainer.json|schemas/.*\.schema\.json)
        args: [--autofix, --no-sort-keys]
      - id: end-of-file-fixer
        exclude: ^schemas/.*\.schema\.json$
      - id: trailing-whitespace
        exclude: ^schemas/.*\.schema\.json$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.2"
    hooks:
      - id: ruff-check
        args: [ --fix, --config=sdk/python/pyproject.toml ]
        # flokoa-types models are owned by datamodel-codegen; verify-codegen
        # enforces their exact (un-ruffed) format, so keep ruff off them.
        exclude: ^sdk/python/(flokoa/tests/|flokoa-types/src/flokoa_types/)
      - id: ruff-format
        args: [ --config=sdk/python/pyproject.toml ]
        exclude: ^sdk/python/(flokoa/tests/|flokoa-types/src/flokoa_types/)
