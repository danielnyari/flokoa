[project]
name = "flokoa"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "a2a-sdk>=0.3.22",
    "click>=8.3.1",
    "fastapi>=0.128.0",
    "pydantic>=2.12.5",
]

[project.scripts]
flokoa = "flokoa.__main__:main"

[build-system]
requires = ["flit_core<4"]
build-backend = "flit_core.buildapi"

[tool.flit.module]
name = "flokoa"

[project.optional-dependencies]
pydantic-ai = [
    "pydantic-ai>=1.44.0",
]

[dependency-groups]
pydantic-ai = [
    "flokoa[pydantic-ai]",
]
