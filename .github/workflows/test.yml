name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test

  integration:
    name: Run Integration Tests (operator + runner, Docker-free)
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sdk/python/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: sdk/python/.python-version

      - name: Sync the SDK workspace (runner subprocess leg)
        working-directory: sdk/python
        run: uv sync --all-packages

      - name: Run the integration suite
        working-directory: operator
        run: make test-integration

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: operator
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: operator
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flokoa-operator:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/flokoa-operator:latest
