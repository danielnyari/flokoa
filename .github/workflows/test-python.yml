name: Python SDK Tests

on:
  push:
    paths:
      - 'sdk/python/**'
      - 'operator/internal/spec/schemas/**'
      - 'operator/test/e2e/fixtures/capabilities/**'
      - '.github/workflows/test-python.yml'
  pull_request:
    paths:
      - 'sdk/python/**'
      - 'operator/internal/spec/schemas/**'
      - 'operator/test/e2e/fixtures/capabilities/**'
      - '.github/workflows/test-python.yml'

permissions:
  contents: read

jobs:
  test:
    name: Run Python SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sdk/python/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: sdk/python/.python-version

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Verify runner contract artifacts (lockfile ↔ manifest ↔ schema)
        run: make verify-runner-contract

      - name: Run flokoa tests
        working-directory: sdk/python/flokoa
        run: uv run python -m pytest --cov --cov-config=pyproject.toml --cov-report=xml --cov-report=term

      - name: Run flokoa-runner tests
        run: uv run --package flokoa-runner python -m pytest flokoa-runner/tests

      - name: Run flokoa-codemode-mcp tests
        run: uv run --package flokoa-codemode-mcp python -m pytest flokoa-codemode-mcp/tests

      - name: Run flokoa-common tests
        run: uv run --package flokoa-common python -m pytest flokoa-common/tests

      - name: Run flokoa-openapi tests
        run: uv run --package flokoa-openapi python -m pytest flokoa-openapi/tests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: sdk/python/flokoa/coverage.xml
          flags: python-sdk
          name: python-sdk-coverage

  # Docker-gated `flokoa capability build` integration tests (roadmap 10).
  # Marker-gated (`-m integration`): the job above stays fast — the markers
  # are skipped there and only run here, against a locally built runner image.
  capability-cli-integration:
    name: Capability CLI Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      # `flokoa capability build` exports the artifact image as an OCI-layout
      # tar (docker buildx build --output type=oci), which the runner's default
      # `docker` buildx driver cannot do ("OCI exporter is not supported for
      # the docker driver"). A docker-container-driver builder provides the OCI
      # exporter; the runner image below then uses `buildx build --load` so it
      # still lands in the daemon for the wheelhouse `docker run`.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sdk/python/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: sdk/python/.python-version

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Build the pinned runner image locally
        run: docker buildx build --load -f flokoa-runner/Dockerfile -t flokoa-runner:ci .

      - name: Run capability CLI integration tests
        working-directory: sdk/python/flokoa
        env:
          FLOKOA_RUNNER_IMAGE: flokoa-runner:ci
        run: uv run python -m pytest -m integration tests/flokoa_cli/capability_cli
