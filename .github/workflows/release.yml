name: Release

# Tag-triggered release pipeline for Flokoa.
#
# Push a semver tag (e.g. `v0.1.0`) to cut a release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# The pipeline:
#   1. Runs unit tests + lint (gate).
#   2. Builds & pushes all images with the semver tag (+ `latest`):
#      operator, server, a2a-plugin, flokoa-runner.
#   3. Packages the Helm chart and pushes it to the GHCR OCI registry.
#   4. Generates a single-file `install.yaml` kustomize bundle.
#   5. Creates a GitHub Release with the CHANGELOG notes + install.yaml asset.
#   6. (Opt-in) Publishes `flokoa` + `flokoa-types` to PyPI when the
#      repository variable PUBLISH_PYPI == 'true' and PYPI_TOKEN is set.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Derive the release version (strip leading `v`) once for downstream jobs.
  # ---------------------------------------------------------------------------
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Gate: unit tests + lint must pass before anything is published.
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Run unit tests
        run: |
          go mod tidy
          make test

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.0
          working-directory: operator

  # ---------------------------------------------------------------------------
  # Build & push all images with the semver tag (+ latest).
  # ---------------------------------------------------------------------------
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [version, test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: flokoa-operator
            context: operator
            dockerfile: operator/Dockerfile
          - image: flokoa-server
            context: operator
            dockerfile: operator/server/Dockerfile
          - image: flokoa-a2a-plugin
            context: operator
            dockerfile: operator/plugins/a2a/Dockerfile
          - image: flokoa-runner
            context: sdk/python
            dockerfile: sdk/python/flokoa-runner/Dockerfile
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  # ---------------------------------------------------------------------------
  # Package the Helm chart and push it to the GHCR OCI registry.
  # ---------------------------------------------------------------------------
  helm:
    name: Package & push Helm chart
    runs-on: ubuntu-latest
    needs: [version, images]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          helm package operator/charts/flokoa \
            --version "${{ needs.version.outputs.version }}" \
            --app-version "${{ needs.version.outputs.version }}" \
            --destination dist

      - name: Push chart to OCI registry
        run: |
          helm push "dist/flokoa-${{ needs.version.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

  # ---------------------------------------------------------------------------
  # Generate the single-file install.yaml kustomize bundle.
  # ---------------------------------------------------------------------------
  installer:
    name: Build install.yaml bundle
    runs-on: ubuntu-latest
    needs: [version]
    defaults:
      run:
        working-directory: operator
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod

      - name: Generate install.yaml
        run: make build-installer VERSION=${{ needs.version.outputs.version }}

      - name: Upload install.yaml artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-yaml
          path: operator/dist/install.yaml

  # ---------------------------------------------------------------------------
  # Create the GitHub Release with notes + install.yaml asset.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, images, helm, installer]
    permissions:
      contents: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Download install.yaml artifact
        uses: actions/download-artifact@v4
        with:
          name: install-yaml
          path: dist

      - name: Extract CHANGELOG notes
        id: notes
        run: |
          version="${{ needs.version.outputs.version }}"
          # Pull the section for this version out of CHANGELOG.md (best effort).
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: dist/install.yaml

  # ---------------------------------------------------------------------------
  # (Opt-in) Publish flokoa + flokoa-types to PyPI.
  # Enable by setting repository variable PUBLISH_PYPI == 'true' and providing
  # the PYPI_TOKEN secret.
  # ---------------------------------------------------------------------------
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [version, test]
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "sdk/python/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: sdk/python/.python-version

      - name: Build wheels
        run: |
          uv build --package flokoa-types --out-dir dist
          uv build --package flokoa --out-dir dist

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish dist/*
